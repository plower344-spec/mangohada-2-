<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 알림 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="notifications">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- 알림 발송 -->
    <div>
      <h2 class="text-lg font-extrabold mb-4">알림 발송</h2>
      <div class="bg-white rounded-2xl border border-gray-100 p-6 space-y-4">
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1.5 block">대상</label>
          <select class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFC107]">
            <option>전체 회원</option>
            <option>구독 회원</option>
            <option>신규 회원 (7일 이내)</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1.5 block">제목</label>
          <input type="text" placeholder="알림 제목을 입력하세요"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFC107]">
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1.5 block">내용</label>
          <textarea rows="4" placeholder="알림 내용을 입력하세요"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFC107] resize-none"></textarea>
        </div>
        <button onclick="alert('알림이 발송되었습니다. (데모)')" class="w-full bg-black text-white text-sm font-bold py-3 rounded-xl">발송하기</button>
      </div>
    </div>

    <!-- 발송 이력 -->
    <div>
      <h2 class="text-lg font-extrabold mb-4">발송 이력</h2>
      <div class="bg-white rounded-2xl border border-gray-100 divide-y divide-gray-50">
        <div class="p-4">
          <div class="flex items-center justify-between mb-1">
            <p class="text-sm font-semibold">6월 행복저금 이벤트 안내</p>
            <span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">완료</span>
          </div>
          <p class="text-xs text-gray-400">전체 회원 · 1,284명 · 2026.6.20</p>
        </div>
        <div class="p-4">
          <div class="flex items-center justify-between mb-1">
            <p class="text-sm font-semibold">신규 전문가 등록 소식</p>
            <span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">완료</span>
          </div>
          <p class="text-xs text-gray-400">전체 회원 · 1,201명 · 2026.6.10</p>
        </div>
        <div class="p-4">
          <div class="flex items-center justify-between mb-1">
            <p class="text-sm font-semibold">망고 포인트 충전 보너스 이벤트</p>
            <span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">완료</span>
          </div>
          <p class="text-xs text-gray-400">구독 회원 · 342명 · 2026.5.30</p>
        </div>
        <div class="p-4">
          <div class="flex items-center justify-between mb-1">
            <p class="text-sm font-semibold">아티클 구독 안내</p>
            <span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">완료</span>
          </div>
          <p class="text-xs text-gray-400">신규 회원 · 87명 · 2026.5.15</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
</body>
</html>
