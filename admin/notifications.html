<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 알림 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="notifications">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- 알림 발송 -->
    <div>
      <h2 class="text-lg font-extrabold mb-4">알림 발송</h2>
      <div class="bg-white rounded-2xl border border-gray-100 p-6 space-y-4">
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1.5 block">대상</label>
          <select id="notifTarget" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFC107]">
            <option value="all">전체 회원</option>
            <option value="subscribers">구독 회원</option>
            <option value="new_users">신규 회원 (7일 이내)</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1.5 block">제목</label>
          <input id="notifTitle" type="text" placeholder="알림 제목을 입력하세요"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFC107]">
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 mb-1.5 block">내용</label>
          <textarea id="notifContent" rows="4" placeholder="알림 내용을 입력하세요"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#FFC107] resize-none"></textarea>
        </div>
        <button onclick="sendNotification()" class="w-full bg-black text-white text-sm font-bold py-3 rounded-xl">발송하기</button>
      </div>
    </div>

    <!-- 발송 이력 -->
    <div>
      <h2 class="text-lg font-extrabold mb-4">발송 이력</h2>
      <div id="historyArea" class="bg-white rounded-2xl border border-gray-100 divide-y divide-gray-50">
        <p class="text-sm text-gray-400 text-center py-8">불러오는 중...</p>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script>
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const TARGET_LABELS = {
    all: '전체 회원',
    subscribers: '구독 회원',
    new_users: '신규 회원',
  };

  function formatDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
  }

  async function loadHistory() {
    const { data, error } = await db
      .from('notifications')
      .select('*')
      .order('sent_at', { ascending: false });

    const area = document.getElementById('historyArea');

    if (error) {
      area.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">데이터를 불러오지 못했어요.</p>';
      return;
    }

    if (!data?.length) {
      area.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">발송 이력이 없어요.</p>';
      return;
    }

    area.innerHTML = data.map(n => `
      <div class="p-4">
        <div class="flex items-center justify-between mb-1">
          <p class="text-sm font-semibold">${n.title || '-'}</p>
          <span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">완료</span>
        </div>
        <p class="text-xs text-gray-400">${TARGET_LABELS[n.target] || n.target || '-'} · ${formatDate(n.sent_at)}</p>
      </div>
    `).join('');
  }

  async function sendNotification() {
    const target = document.getElementById('notifTarget').value;
    const title = document.getElementById('notifTitle').value.trim();
    const content = document.getElementById('notifContent').value.trim();

    if (!title || !content) {
      alert('제목과 내용을 모두 입력해주세요.');
      return;
    }

    const { error } = await db.from('notifications').insert({
      target,
      title,
      content,
      sent_at: new Date().toISOString(),
    });

    if (error) {
      alert('발송 중 오류가 발생했어요.');
      return;
    }

    document.getElementById('notifTitle').value = '';
    document.getElementById('notifContent').value = '';
    alert('알림이 발송되었습니다.');
    loadHistory();
  }

  loadHistory();
</script>
</body>
</html>
