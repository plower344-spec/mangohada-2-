<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 대시보드</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="dashboard">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">

  <!-- 요약 카드 -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">총 행복저금</p>
      <p id="statHappy" class="text-2xl font-extrabold">-</p>
      <p class="text-xs text-gray-400 mt-1">Supabase 실시간</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">총 회원</p>
      <p class="text-2xl font-extrabold text-gray-300">-</p>
      <p class="text-xs text-gray-300 mt-1">준비 중</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">이달 결제액</p>
      <p class="text-2xl font-extrabold text-gray-300">-</p>
      <p class="text-xs text-gray-300 mt-1">준비 중</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">미처리 문의</p>
      <p class="text-2xl font-extrabold text-gray-300">-</p>
      <p class="text-xs text-gray-300 mt-1">준비 중</p>
    </div>
  </div>

  <!-- 최근 행복저금 -->
  <div class="bg-white rounded-2xl p-6 border border-gray-100">
    <div class="flex items-center justify-between mb-4">
      <p class="text-sm font-bold">최근 행복저금</p>
      <a href="happy-savings.html" class="text-xs text-gray-400 hover:text-gray-700">전체보기 ›</a>
    </div>
    <table class="w-full text-sm">
      <thead>
        <tr class="text-xs text-gray-400 border-b border-gray-100">
          <th class="text-left pb-2 font-semibold">작성자</th>
          <th class="text-left pb-2 font-semibold">내용</th>
          <th class="text-left pb-2 font-semibold">작성일</th>
        </tr>
      </thead>
      <tbody id="recentBody" class="divide-y divide-gray-50">
        <tr><td colspan="3" class="py-6 text-center text-sm text-gray-400">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script>
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
  }

  async function loadDashboard() {
    // 총 행복저금 수
    const { count } = await db.from('happy_savings').select('*', { count: 'exact', head: true });
    document.getElementById('statHappy').textContent = (count ?? 0).toLocaleString() + '건';

    // 최근 5개 항목
    const { data } = await db.from('happy_savings').select('*').order('created_at', { ascending: false }).limit(5);
    const tbody = document.getElementById('recentBody');
    if (!data?.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="py-6 text-center text-sm text-gray-400">아직 등록된 행복저금이 없어요.</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(e => `
      <tr>
        <td class="py-2.5 font-medium">${e.author || '익명'}</td>
        <td class="py-2.5 text-gray-500 max-w-xs truncate">${e.content}</td>
        <td class="py-2.5 text-gray-400 text-xs">${formatDate(e.created_at)}</td>
      </tr>
    `).join('');
  }

  loadDashboard();
</script>
</body>
</html>
