<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 회원 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="users">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-lg font-extrabold">회원 관리</h2>
      <p class="text-xs text-gray-400 mt-0.5">총 <span id="totalCount">-</span>명</p>
    </div>
    <input type="text" id="userSearch" placeholder="이름 검색"
      class="border border-gray-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-[#FFC107] w-64">
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr class="text-xs text-gray-400 font-semibold">
          <th class="text-left px-5 py-3">이름</th>
          <th class="text-left px-5 py-3">역할</th>
          <th class="text-left px-5 py-3">생년월일</th>
          <th class="text-left px-5 py-3">성별</th>
          <th class="text-left px-5 py-3">가입일</th>
        </tr>
      </thead>
      <tbody id="usersBody" class="divide-y divide-gray-50">
        <tr><td colspan="5" class="px-5 py-8 text-center text-sm text-gray-400">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script>
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function formatDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
  }

  let allUsers = [];

  async function loadUsers() {
    const { data, count, error } = await db
      .from('profiles')
      .select('*', { count: 'exact' })
      .order('created_at', { ascending: false });

    const tbody = document.getElementById('usersBody');

    if (error) {
      tbody.innerHTML = `<tr><td colspan="5" class="px-5 py-8 text-center text-sm text-gray-400">데이터를 불러오지 못했어요.</td></tr>`;
      return;
    }

    document.getElementById('totalCount').textContent = (count ?? 0).toLocaleString();
    allUsers = data || [];
    renderUsers(allUsers);
  }

  function genderLabel(g) {
    if (g === 'male') return '남성';
    if (g === 'female') return '여성';
    return '-';
  }

  function renderUsers(users) {
    const tbody = document.getElementById('usersBody');
    if (!users.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="px-5 py-8 text-center text-sm text-gray-400">등록된 회원이 없어요.</td></tr>`;
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td class="px-5 py-3 font-medium">${u.name || '-'}</td>
        <td class="px-5 py-3">
          <span class="bg-gray-100 text-xs px-2 py-0.5 rounded-full">${u.role || 'user'}</span>
        </td>
        <td class="px-5 py-3 text-gray-400">${u.birth_date ? u.birth_date.replaceAll('-', '.') : '-'}</td>
        <td class="px-5 py-3 text-gray-500">${genderLabel(u.gender)}</td>
        <td class="px-5 py-3 text-gray-400">${formatDate(u.created_at)}</td>
      </tr>
    `).join('');
  }

  document.getElementById('userSearch').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    renderUsers(allUsers.filter(u => (u.name || '').toLowerCase().includes(q)));
  });

  loadUsers();
</script>
</body>
</html>
