<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 전문가 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="experts">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-lg font-extrabold">전문가 관리</h2>
      <p class="text-xs text-gray-400 mt-0.5">총 24명</p>
    </div>
    <button class="bg-black text-white text-sm font-bold px-4 py-2 rounded-xl">+ 전문가 등록</button>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr class="text-xs text-gray-400 font-semibold">
          <th class="text-left px-5 py-3">이름</th>
          <th class="text-left px-5 py-3">분야</th>
          <th class="text-left px-5 py-3">소개</th>
          <th class="text-left px-5 py-3">평점</th>
          <th class="text-left px-5 py-3">상담 수</th>
          <th class="text-left px-5 py-3">상태</th>
          <th class="px-5 py-3"></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-50">
        <tr>
          <td class="px-5 py-3 font-medium">김영희</td>
          <td class="px-5 py-3"><span class="bg-purple-50 text-purple-600 text-[11px] font-bold px-2 py-0.5 rounded-full">변호사</span></td>
          <td class="px-5 py-3 text-gray-500 text-xs">19년 경력 유언 전문 변호사</td>
          <td class="px-5 py-3 font-semibold">⭐ 4.8</td>
          <td class="px-5 py-3">312회</td>
          <td class="px-5 py-3"><span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">활성</span></td>
          <td class="px-5 py-3 flex gap-2"><button class="text-xs text-gray-400 hover:text-gray-700">수정</button><button class="text-xs text-red-400 hover:text-red-600">삭제</button></td>
        </tr>
        <tr>
          <td class="px-5 py-3 font-medium">이정현</td>
          <td class="px-5 py-3"><span class="bg-blue-50 text-blue-600 text-[11px] font-bold px-2 py-0.5 rounded-full">재무설계</span></td>
          <td class="px-5 py-3 text-gray-500 text-xs">유산 정리 전문 재무상담사</td>
          <td class="px-5 py-3 font-semibold">⭐ 4.6</td>
          <td class="px-5 py-3">198회</td>
          <td class="px-5 py-3"><span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">활성</span></td>
          <td class="px-5 py-3 flex gap-2"><button class="text-xs text-gray-400 hover:text-gray-700">수정</button><button class="text-xs text-red-400 hover:text-red-600">삭제</button></td>
        </tr>
        <tr>
          <td class="px-5 py-3 font-medium">박소연</td>
          <td class="px-5 py-3"><span class="bg-pink-50 text-pink-600 text-[11px] font-bold px-2 py-0.5 rounded-full">심리상담</span></td>
          <td class="px-5 py-3 text-gray-500 text-xs">임종 심리 전문 상담사</td>
          <td class="px-5 py-3 font-semibold">⭐ 4.9</td>
          <td class="px-5 py-3">421회</td>
          <td class="px-5 py-3"><span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">활성</span></td>
          <td class="px-5 py-3 flex gap-2"><button class="text-xs text-gray-400 hover:text-gray-700">수정</button><button class="text-xs text-red-400 hover:text-red-600">삭제</button></td>
        </tr>
        <tr>
          <td class="px-5 py-3 font-medium">최장현</td>
          <td class="px-5 py-3"><span class="bg-gray-100 text-gray-600 text-[11px] font-bold px-2 py-0.5 rounded-full">장례지도</span></td>
          <td class="px-5 py-3 text-gray-500 text-xs">20년 경력 장례지도사</td>
          <td class="px-5 py-3 font-semibold">⭐ 4.7</td>
          <td class="px-5 py-3">87회</td>
          <td class="px-5 py-3"><span class="text-[11px] font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">비활성</span></td>
          <td class="px-5 py-3 flex gap-2"><button class="text-xs text-gray-400 hover:text-gray-700">수정</button><button class="text-xs text-red-400 hover:text-red-600">삭제</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
</body>
</html>
