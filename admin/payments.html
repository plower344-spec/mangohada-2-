<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 결제 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="payments">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">
  <div class="grid grid-cols-3 gap-5 mb-8">
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">이달 총 결제액</p>
      <p class="text-2xl font-extrabold" id="statTotal">-</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">이달 결제 건수</p>
      <p class="text-2xl font-extrabold" id="statCount">-</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">환불 건수</p>
      <p class="text-2xl font-extrabold" id="statRefund">-</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr class="text-xs text-gray-400 font-semibold">
          <th class="text-left px-5 py-3">회원</th>
          <th class="text-left px-5 py-3">상품</th>
          <th class="text-left px-5 py-3">금액</th>
          <th class="text-left px-5 py-3">결제 방식</th>
          <th class="text-left px-5 py-3">결제일</th>
          <th class="text-left px-5 py-3">상태</th>
        </tr>
      </thead>
      <tbody id="paymentsBody" class="divide-y divide-gray-50">
        <tr><td colspan="6" class="px-5 py-8 text-center text-sm text-gray-400">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script>
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function formatDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
  }

  function statusBadge(status) {
    if (status === 'refund_requested') return '<span class="text-[11px] font-bold text-orange-500 bg-orange-50 px-2 py-0.5 rounded-full">환불 요청</span>';
    if (status === 'refunded') return '<span class="text-[11px] font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">환불 완료</span>';
    return '<span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">완료</span>';
  }

  async function loadPayments() {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();

    const [{ data, error }, { data: monthData }] = await Promise.all([
      db.from('payments').select('*').order('created_at', { ascending: false }),
      db.from('payments').select('amount, status').gte('created_at', monthStart),
    ]);

    const tbody = document.getElementById('paymentsBody');

    if (error) {
      tbody.innerHTML = `<tr><td colspan="6" class="px-5 py-8 text-center text-sm text-gray-400">데이터를 불러오지 못했어요.</td></tr>`;
      document.getElementById('statTotal').textContent = '-';
      document.getElementById('statCount').textContent = '-';
      document.getElementById('statRefund').textContent = '-';
      return;
    }

    const completed = (monthData || []).filter(p => p.status === 'completed');
    const refunds = (monthData || []).filter(p => p.status === 'refund_requested' || p.status === 'refunded');
    const total = completed.reduce((sum, p) => sum + (p.amount || 0), 0);

    document.getElementById('statTotal').textContent = '₩' + total.toLocaleString();
    document.getElementById('statCount').textContent = completed.length + '건';
    document.getElementById('statRefund').textContent = refunds.length + '건';

    if (!data?.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="px-5 py-8 text-center text-sm text-gray-400">결제 내역이 없어요.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(p => `
      <tr>
        <td class="px-5 py-3 font-medium">${p.user_name || '-'}</td>
        <td class="px-5 py-3 text-gray-500">${p.product || '-'}</td>
        <td class="px-5 py-3 font-semibold">₩${(p.amount || 0).toLocaleString()}</td>
        <td class="px-5 py-3 text-gray-400">${p.payment_method || '-'}</td>
        <td class="px-5 py-3 text-gray-400">${formatDate(p.created_at)}</td>
        <td class="px-5 py-3">${statusBadge(p.status)}</td>
      </tr>
    `).join('');
  }

  loadPayments();
</script>
</body>
</html>
