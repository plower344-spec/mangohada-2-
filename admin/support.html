<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 1:1 문의</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="support">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-lg font-extrabold">1:1 문의</h2>
      <p class="text-xs text-gray-400 mt-0.5">미처리 <span id="pendingCount" class="font-bold text-red-500">-</span>건</p>
    </div>
    <div class="flex gap-2">
      <button onclick="setFilter('')" id="btn-all" class="text-sm font-bold px-4 py-2 rounded-xl border border-gray-200 hover:bg-gray-50">전체</button>
      <button onclick="setFilter('pending')" id="btn-pending" class="text-sm font-bold px-4 py-2 rounded-xl border border-gray-200 hover:bg-gray-50">미처리</button>
      <button onclick="setFilter('resolved')" id="btn-resolved" class="text-sm font-bold px-4 py-2 rounded-xl border border-gray-200 hover:bg-gray-50">처리 완료</button>
    </div>
  </div>

  <div id="ticketsArea" class="space-y-3">
    <p class="text-sm text-gray-400 text-center py-8">불러오는 중...</p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script>
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentFilter = '';
  let allTickets = [];

  function formatDateTime(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  async function loadTickets() {
    const { data, error } = await db
      .from('inquiries')
      .select('*')
      .order('created_at', { ascending: false });

    const area = document.getElementById('ticketsArea');

    if (error) {
      area.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">데이터를 불러오지 못했어요.</p>';
      return;
    }

    allTickets = data || [];
    const pending = allTickets.filter(t => t.status === 'pending').length;
    document.getElementById('pendingCount').textContent = pending;
    renderTickets();
  }

  function renderTickets() {
    const area = document.getElementById('ticketsArea');
    const filtered = currentFilter ? allTickets.filter(t => t.status === currentFilter) : allTickets;

    ['btn-all','btn-pending','btn-resolved'].forEach(id => {
      document.getElementById(id).className = 'text-sm font-bold px-4 py-2 rounded-xl border border-gray-200 hover:bg-gray-50';
    });
    const activeId = currentFilter === 'pending' ? 'btn-pending' : currentFilter === 'resolved' ? 'btn-resolved' : 'btn-all';
    document.getElementById(activeId).className = 'text-sm font-bold px-4 py-2 rounded-xl bg-red-50 text-red-500 border border-red-100';

    if (!filtered.length) {
      area.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">문의가 없어요.</p>';
      return;
    }

    area.innerHTML = filtered.map(t => `
      <div class="bg-white rounded-2xl border border-gray-100 p-5 ${t.status === 'resolved' ? 'opacity-60' : ''}">
        <div class="flex items-start justify-between">
          <div class="flex-1">
            <p class="text-sm font-bold mb-1">${t.title || '(제목 없음)'}</p>
            <p class="text-xs text-gray-400">${t.user_name || '익명'} · ${formatDateTime(t.created_at)}</p>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">${t.content || ''}</p>
            ${t.reply ? `
              <div class="mt-3 bg-gray-50 rounded-xl p-3 text-xs text-gray-600">
                <p class="font-semibold mb-1">답변 완료</p>
                ${t.reply}
              </div>` : ''}
          </div>
          <span class="text-[11px] font-bold shrink-0 ml-4 px-2 py-0.5 rounded-full ${
            t.status === 'resolved'
              ? 'text-green-600 bg-green-50'
              : 'text-red-500 bg-red-50'
          }">${t.status === 'resolved' ? '처리 완료' : '미처리'}</span>
        </div>
        ${t.status !== 'resolved' ? `
          <div class="mt-4 pt-4 border-t border-gray-50">
            <textarea id="reply-${t.id}" rows="2" placeholder="답변을 입력하세요"
              class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[#FFC107] resize-none"></textarea>
            <button onclick="sendReply('${t.id}')" class="mt-2 text-xs font-bold bg-black text-white px-4 py-2 rounded-xl">답변 전송</button>
          </div>` : ''}
      </div>
    `).join('');
  }

  async function sendReply(id) {
    const reply = document.getElementById(`reply-${id}`).value.trim();
    if (!reply) { alert('답변을 입력해주세요.'); return; }
    const { error } = await db
      .from('inquiries')
      .update({ reply, status: 'resolved' })
      .eq('id', id);
    if (error) { alert('전송 중 오류가 발생했어요.'); return; }
    loadTickets();
  }

  function setFilter(f) {
    currentFilter = f;
    renderTickets();
  }

  loadTickets();
</script>
</body>
</html>
