<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 통계</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="stats">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">
  <h2 class="text-lg font-extrabold mb-6">통계</h2>

  <!-- 월별 요약 -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">신규 가입 (6월)</p>
      <p class="text-2xl font-extrabold">83명</p>
      <p class="text-xs text-green-500 mt-1">↑ 12% vs 5월</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">행복저금 작성 (6월)</p>
      <p class="text-2xl font-extrabold">1,247건</p>
      <p class="text-xs text-green-500 mt-1">↑ 8% vs 5월</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">전문가 상담 (6월)</p>
      <p class="text-2xl font-extrabold">214회</p>
      <p class="text-xs text-red-500 mt-1">↓ 3% vs 5월</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">구독 전환율</p>
      <p class="text-2xl font-extrabold">26.7%</p>
      <p class="text-xs text-green-500 mt-1">↑ 2.1%p vs 5월</p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- 가입 방식 분포 -->
    <div class="bg-white rounded-2xl border border-gray-100 p-6">
      <p class="text-sm font-bold mb-5">회원 가입 방식</p>
      <div class="space-y-3">
        <div>
          <div class="flex justify-between text-sm mb-1"><span class="font-medium">카카오</span><span class="text-gray-500">52%</span></div>
          <div class="h-2 bg-gray-100 rounded-full"><div class="h-2 bg-yellow-400 rounded-full" style="width:52%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-1"><span class="font-medium">구글</span><span class="text-gray-500">31%</span></div>
          <div class="h-2 bg-gray-100 rounded-full"><div class="h-2 bg-blue-400 rounded-full" style="width:31%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-1"><span class="font-medium">이메일</span><span class="text-gray-500">17%</span></div>
          <div class="h-2 bg-gray-100 rounded-full"><div class="h-2 bg-gray-400 rounded-full" style="width:17%"></div></div>
        </div>
      </div>
    </div>

    <!-- 전문가 상담 분야 -->
    <div class="bg-white rounded-2xl border border-gray-100 p-6">
      <p class="text-sm font-bold mb-5">전문가 분야별 상담 비율</p>
      <div class="space-y-3">
        <div>
          <div class="flex justify-between text-sm mb-1"><span class="font-medium">심리상담</span><span class="text-gray-500">38%</span></div>
          <div class="h-2 bg-gray-100 rounded-full"><div class="h-2 bg-pink-400 rounded-full" style="width:38%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-1"><span class="font-medium">변호사</span><span class="text-gray-500">28%</span></div>
          <div class="h-2 bg-gray-100 rounded-full"><div class="h-2 bg-purple-400 rounded-full" style="width:28%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-1"><span class="font-medium">재무설계</span><span class="text-gray-500">21%</span></div>
          <div class="h-2 bg-gray-100 rounded-full"><div class="h-2 bg-blue-400 rounded-full" style="width:21%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-1"><span class="font-medium">장례지도 / 보험</span><span class="text-gray-500">13%</span></div>
          <div class="h-2 bg-gray-100 rounded-full"><div class="h-2 bg-gray-400 rounded-full" style="width:13%"></div></div>
        </div>
      </div>
    </div>

    <!-- 월별 가입 추이 -->
    <div class="bg-white rounded-2xl border border-gray-100 p-6 lg:col-span-2">
      <p class="text-sm font-bold mb-5">월별 신규 가입 추이</p>
      <div class="flex items-end gap-4 h-32">
        <div class="flex flex-col items-center gap-1 flex-1">
          <span class="text-xs text-gray-400">51</span>
          <div class="w-full bg-[#FFC107] rounded-t-lg" style="height:40%"></div>
          <span class="text-xs text-gray-400">1월</span>
        </div>
        <div class="flex flex-col items-center gap-1 flex-1">
          <span class="text-xs text-gray-400">63</span>
          <div class="w-full bg-[#FFC107] rounded-t-lg" style="height:50%"></div>
          <span class="text-xs text-gray-400">2월</span>
        </div>
        <div class="flex flex-col items-center gap-1 flex-1">
          <span class="text-xs text-gray-400">58</span>
          <div class="w-full bg-[#FFC107] rounded-t-lg" style="height:46%"></div>
          <span class="text-xs text-gray-400">3월</span>
        </div>
        <div class="flex flex-col items-center gap-1 flex-1">
          <span class="text-xs text-gray-400">72</span>
          <div class="w-full bg-[#FFC107] rounded-t-lg" style="height:57%"></div>
          <span class="text-xs text-gray-400">4월</span>
        </div>
        <div class="flex flex-col items-center gap-1 flex-1">
          <span class="text-xs text-gray-400">74</span>
          <div class="w-full bg-[#FFC107] rounded-t-lg" style="height:59%"></div>
          <span class="text-xs text-gray-400">5월</span>
        </div>
        <div class="flex flex-col items-center gap-1 flex-1">
          <span class="text-xs text-gray-400 font-bold text-[#FFC107]">83</span>
          <div class="w-full bg-[#FFC107] rounded-t-lg border-2 border-yellow-300" style="height:66%"></div>
          <span class="text-xs font-bold text-gray-700">6월</span>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
</body>
</html>
