<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 통계</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="stats">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">
  <h2 class="text-lg font-extrabold mb-6">통계</h2>

  <div class="grid grid-cols-2 gap-5 mb-8 max-w-sm">
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">전체 회원</p>
      <p class="text-2xl font-extrabold" id="statUsers">-</p>
      <p class="text-xs text-gray-400 mt-1">누적</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100">
      <p class="text-xs text-gray-400 mb-1">전체 행복저금</p>
      <p class="text-2xl font-extrabold" id="statHappy">-</p>
      <p class="text-xs text-gray-400 mt-1">누적</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 p-6">
    <p class="text-sm font-bold mb-5">월별 신규 가입 추이 (올해)</p>
    <div id="chartArea" class="flex items-end gap-4 h-32">
      <p class="text-xs text-gray-400">불러오는 중...</p>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script>
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const now = new Date();
  const thisYear = now.getFullYear();
  const currentMonth = now.getMonth();

  async function loadStats() {
    const [{ count: userCount }, { count: happyCount }, { data: profiles }] = await Promise.all([
      db.from('profiles').select('*', { count: 'exact', head: true }),
      db.from('happy_savings').select('*', { count: 'exact', head: true }),
      db.from('profiles').select('created_at')
        .gte('created_at', `${thisYear}-01-01`)
        .lte('created_at', `${thisYear}-12-31`),
    ]);

    document.getElementById('statUsers').textContent = (userCount ?? 0).toLocaleString() + '명';
    document.getElementById('statHappy').textContent = (happyCount ?? 0).toLocaleString() + '건';

    const monthly = Array(12).fill(0);
    (profiles || []).forEach(p => {
      const m = new Date(p.created_at).getMonth();
      monthly[m]++;
    });

    const visibleMonths = monthly.slice(0, currentMonth + 1);
    const maxVal = Math.max(...visibleMonths, 1);
    const chartArea = document.getElementById('chartArea');

    if (visibleMonths.every(v => v === 0)) {
      chartArea.innerHTML = '<p class="text-xs text-gray-400">아직 가입 데이터가 없어요.</p>';
      return;
    }

    chartArea.innerHTML = visibleMonths.map((val, i) => `
      <div class="flex flex-col items-center gap-1 flex-1">
        <span class="text-xs ${i === currentMonth ? 'font-bold text-[#FFC107]' : 'text-gray-400'}">${val}</span>
        <div class="w-full bg-[#FFC107] rounded-t-lg ${i === currentMonth ? 'border-2 border-yellow-300' : ''}"
             style="height:${Math.max((val / maxVal) * 100, 4)}%"></div>
        <span class="text-xs ${i === currentMonth ? 'font-bold text-gray-700' : 'text-gray-400'}">${MONTHS[i]}</span>
      </div>
    `).join('');
  }

  loadStats();
</script>
</body>
</html>
