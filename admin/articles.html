<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada 관리자 — 아티클 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900" data-page="articles">

<div id="admin-sidebar"></div>
<div id="admin-header"></div>

<main class="ml-56 pt-14 min-h-screen p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-lg font-extrabold">아티클 관리</h2>
      <p class="text-xs text-gray-400 mt-0.5">총 <span id="totalCount">-</span>건</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr class="text-xs text-gray-400 font-semibold">
          <th class="text-left px-5 py-3">제목</th>
          <th class="text-left px-5 py-3">에디터</th>
          <th class="text-left px-5 py-3">카테고리</th>
          <th class="text-left px-5 py-3">게시일</th>
          <th class="text-left px-5 py-3">상태</th>
          <th class="px-5 py-3"></th>
        </tr>
      </thead>
      <tbody id="articlesBody" class="divide-y divide-gray-50">
        <tr><td colspan="6" class="px-5 py-8 text-center text-sm text-gray-400">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script>
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
  }

  function statusBadge(status) {
    if (status === 'draft') return '<span class="text-[11px] font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">임시저장</span>';
    return '<span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">게시 중</span>';
  }

  const CATEGORY_COLORS = {
    '유언': 'bg-yellow-50 text-yellow-600',
    '장례': 'bg-green-50 text-green-600',
    '마무리': 'bg-blue-50 text-blue-600',
  };

  async function loadArticles() {
    const { data, count, error } = await db
      .from('articles')
      .select('*', { count: 'exact' })
      .order('created_at', { ascending: false });

    const tbody = document.getElementById('articlesBody');

    if (error) {
      tbody.innerHTML = `<tr><td colspan="6" class="px-5 py-8 text-center text-sm text-gray-400">데이터를 불러오지 못했어요.</td></tr>`;
      return;
    }

    document.getElementById('totalCount').textContent = (count ?? 0).toLocaleString();

    if (!data?.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="px-5 py-8 text-center text-sm text-gray-400">등록된 아티클이 없어요.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(a => `
      <tr>
        <td class="px-5 py-3 font-medium">${a.title || '-'}</td>
        <td class="px-5 py-3 text-gray-500">${a.editor || '-'}</td>
        <td class="px-5 py-3">
          <span class="text-[11px] font-bold px-2 py-0.5 rounded-full ${CATEGORY_COLORS[a.category] || 'bg-gray-100 text-gray-600'}">
            ${a.category || '-'}
          </span>
        </td>
        <td class="px-5 py-3 text-gray-400">${formatDate(a.published_at)}</td>
        <td class="px-5 py-3">${statusBadge(a.status)}</td>
        <td class="px-5 py-3">
          <button onclick="deleteArticle('${a.id}')" class="text-xs text-red-400 hover:text-red-600">삭제</button>
        </td>
      </tr>
    `).join('');
  }

  async function deleteArticle(id) {
    if (!confirm('이 아티클을 삭제할까요?')) return;
    const { error } = await db.from('articles').delete().eq('id', id);
    if (error) { alert('삭제 중 오류가 발생했어요.'); return; }
    loadArticles();
  }

  loadArticles();
</script>
</body>
</html>
