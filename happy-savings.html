<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada — 행복저금</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .happy-bg {
    background: linear-gradient(180deg,
      #DFF3FB 0%,
      #CFEFF9 22%,
      #BFE8E3 42%,
      #AEE0BE 58%,
      #8FD19E 75%,
      #6FBF82 100%);
    position: relative;
    overflow: hidden;
    min-height: calc(100vh - 56px);
  }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.75);
    border-radius: 9999px;
    filter: blur(1px);
  }
  .clover {
    position: absolute;
    width: 46px;
    height: 46px;
    opacity: 0.95;
  }
</style>
</head>
<body class="bg-white text-gray-900" data-page="happy">

<!-- 상단 바 -->
<div class="sticky top-0 z-50 bg-[#F2F2F2] h-14 flex items-center px-5">
  <a href="index.html" aria-label="뒤로가기">
    <svg class="w-6 h-6 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
  </a>
</div>

<!-- 행복저금 메인 화면 -->
<main class="happy-bg px-6 pt-8 pb-28">

  <!-- 장식: 구름 -->
  <div class="cloud" style="width:140px;height:60px;top:18%;left:-20px;"></div>
  <div class="cloud" style="width:90px;height:46px;top:30%;right:0;"></div>
  <div class="cloud" style="width:170px;height:80px;top:42%;right:-40px;"></div>
  <div class="cloud" style="width:80px;height:40px;top:14%;left:55%;"></div>

  <!-- 장식: 클로버 -->
  <svg class="clover" style="bottom:90px;left:8%;" viewBox="0 0 64 64"><g fill="#3F8F4F"><circle cx="24" cy="22" r="13"/><circle cx="40" cy="22" r="13"/><circle cx="24" cy="38" r="13"/><circle cx="40" cy="38" r="13"/></g><line x1="32" y1="44" x2="32" y2="60" stroke="#3F8F4F" stroke-width="3" stroke-linecap="round"/></svg>
  <svg class="clover" style="bottom:140px;right:10%;width:56px;height:56px;" viewBox="0 0 64 64"><g fill="#357C44"><circle cx="24" cy="22" r="13"/><circle cx="40" cy="22" r="13"/><circle cx="24" cy="38" r="13"/><circle cx="40" cy="38" r="13"/></g><line x1="32" y1="44" x2="32" y2="60" stroke="#357C44" stroke-width="3" stroke-linecap="round"/></svg>
  <svg class="clover" style="bottom:40px;left:30%;width:38px;height:38px;" viewBox="0 0 64 64"><g fill="#4FA45F"><circle cx="24" cy="22" r="13"/><circle cx="40" cy="22" r="13"/><circle cx="24" cy="38" r="13"/><circle cx="40" cy="38" r="13"/></g><line x1="32" y1="44" x2="32" y2="60" stroke="#4FA45F" stroke-width="3" stroke-linecap="round"/></svg>
  <svg class="clover" style="bottom:20px;right:25%;width:32px;height:32px;" viewBox="0 0 64 64"><g fill="#3F8F4F"><circle cx="24" cy="22" r="13"/><circle cx="40" cy="22" r="13"/><circle cx="24" cy="38" r="13"/><circle cx="40" cy="38" r="13"/></g><line x1="32" y1="44" x2="32" y2="60" stroke="#3F8F4F" stroke-width="3" stroke-linecap="round"/></svg>

  <div class="relative max-w-md mx-auto">
    <h1 class="text-2xl font-extrabold mb-6">행복저금</h1>

    <!-- 저금한 행복 -->
    <div class="bg-white rounded-2xl px-5 py-5 flex items-center justify-between shadow-sm mb-3">
      <span class="text-base font-semibold text-gray-700">저금한 행복</span>
      <span id="happyCount" class="text-xl font-extrabold text-[#FFC107]">0개</span>
    </div>

    <!-- 행복 저금하기 -->
    <button id="openWriteBtn" class="w-full bg-white rounded-2xl px-5 py-5 flex items-center justify-between shadow-sm mb-6">
      <span class="text-base font-semibold text-gray-700">행복 저금하기</span>
      <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
    </button>

    <p class="text-[15px] leading-relaxed font-medium mb-10">
      오늘 행복했던 순간이 없나요? 작은 즐거움도 좋아요! 찰나의 순간을 찾아보세요.
    </p>

    <div class="text-center mb-2">
      <p class="text-sm text-gray-500/80 mb-1">다른 유저의 행복저금도 확인할 수 있어요!</p>
      <button id="viewOthersBtn" class="text-sm font-semibold underline">유저들의 행복저금 보기</button>
    </div>
  </div>
</main>

<!-- 랜덤 뽑기 고정 버튼 -->
<div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-white via-white/90 to-transparent">
  <button id="randomDrawBtn" class="max-w-md mx-auto w-full block bg-black text-white text-base font-bold py-4 rounded-2xl">행복저금 랜덤 뽑기</button>
</div>

<!-- ================= 글쓰기 오버레이 ================= -->
<div id="writeOverlay" class="hidden fixed inset-0 z-[60] bg-[#F2F2F2]">
  <div class="flex items-center justify-between px-5 h-14">
    <button id="closeWriteBtn" aria-label="닫기">
      <svg class="w-6 h-6 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
    </button>
    <button id="submitWriteBtn" class="text-base font-semibold text-gray-900">등록</button>
  </div>

  <div class="px-6 pt-4">
    <div class="flex items-start justify-between mb-4">
      <span id="writeDate" class="text-xl font-extrabold"></span>
      <svg class="w-12 h-12" viewBox="0 0 64 64">
        <g fill="#3F8F4F"><circle cx="24" cy="22" r="13"/><circle cx="40" cy="22" r="13"/><circle cx="24" cy="38" r="13"/><circle cx="40" cy="38" r="13"/></g>
        <circle cx="32" cy="30" r="9" fill="#FAE27C"/>
        <circle cx="28" cy="28" r="1.4" fill="#3a2e1a"/>
        <circle cx="36" cy="28" r="1.4" fill="#3a2e1a"/>
        <path d="M27 33 Q32 36 37 33" stroke="#3a2e1a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <textarea id="writeTextarea" maxlength="500" placeholder="오늘의 행복했던 순간을 적어보세요"
      class="w-full h-64 border-2 border-[#FFC107] rounded-2xl p-4 text-base focus:outline-none resize-none"></textarea>
    <p class="text-right text-sm text-gray-400 mt-2"><span id="charCount">0</span>/500</p>
  </div>
</div>

<!-- ================= 랜덤 뽑기 결과 모달 ================= -->
<div id="randomModal" class="hidden fixed inset-0 z-[70] bg-black/50 flex items-center justify-center px-8">
  <div class="bg-white rounded-3xl p-7 w-full max-w-sm">
    <p id="modalDate" class="text-xl font-extrabold mb-4"></p>
    <p id="modalContent" class="text-base leading-relaxed text-gray-800 mb-4"></p>
    <p id="modalAuthor" class="text-sm text-gray-400 mb-6"></p>
    <button id="modalConfirmBtn" class="bg-black text-white text-sm font-bold px-6 py-3 rounded-xl float-right">확인</button>
  </div>
</div>

<!-- ================= 다른 유저 행복저금 모달 ================= -->
<div id="othersModal" class="hidden fixed inset-0 z-[70] bg-black/50 flex items-end md:items-center justify-center">
  <div class="bg-white rounded-t-3xl md:rounded-3xl p-6 w-full max-w-md max-h-[75vh] overflow-y-auto scrollbar-none">
    <div class="flex items-center justify-between mb-4">
      <p class="text-lg font-extrabold">유저들의 행복저금</p>
      <button id="closeOthersBtn" class="text-gray-400 text-xl leading-none">✕</button>
    </div>
    <div id="othersList" class="space-y-3"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/layout.js"></script>
<script>
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const MY_IDS_KEY = 'mangohada_happy_savings_my_ids';

  function getMyIds() {
    try { return JSON.parse(localStorage.getItem(MY_IDS_KEY)) || []; } catch { return []; }
  }
  function addMyId(id) {
    const ids = getMyIds();
    ids.unshift(id);
    localStorage.setItem(MY_IDS_KEY, JSON.stringify(ids));
  }
  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
  }
  function todayLabel() {
    const d = new Date();
    return `${String(d.getFullYear()).slice(2)}.${d.getMonth() + 1}.${d.getDate()}`;
  }
  async function refreshCount() {
    const { count } = await db.from('happy_savings').select('*', { count: 'exact', head: true });
    document.getElementById('happyCount').textContent = `${count || 0}개`;
  }

  // 글쓰기 오버레이
  const writeOverlay = document.getElementById('writeOverlay');
  const writeTextarea = document.getElementById('writeTextarea');
  const charCount = document.getElementById('charCount');

  document.getElementById('openWriteBtn').addEventListener('click', () => {
    document.getElementById('writeDate').textContent = todayLabel();
    writeTextarea.value = '';
    charCount.textContent = '0';
    writeOverlay.classList.remove('hidden');
  });
  document.getElementById('closeWriteBtn').addEventListener('click', () => {
    writeOverlay.classList.add('hidden');
  });
  writeTextarea.addEventListener('input', () => {
    charCount.textContent = writeTextarea.value.length;
  });
  document.getElementById('submitWriteBtn').addEventListener('click', async () => {
    const text = writeTextarea.value.trim();
    if (!text) { alert('오늘의 행복했던 순간을 적어주세요.'); return; }
    const currentUser = (typeof getCurrentUser === 'function') ? getCurrentUser() : null;
    const author = currentUser?.name || '익명';
    const { data, error } = await db.from('happy_savings').insert({ content: text, author }).select().single();
    if (error) { alert('저장 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.'); console.error(error); return; }
    addMyId(data.id);
    await refreshCount();
    writeOverlay.classList.add('hidden');
  });

  // 랜덤 뽑기
  document.getElementById('randomDrawBtn').addEventListener('click', async () => {
    const { data } = await db.from('happy_savings').select('*');
    if (!data?.length) { alert('아직 저금된 행복이 없어요. 먼저 행복을 저금해 보세요!'); return; }
    const picked = data[Math.floor(Math.random() * data.length)];
    document.getElementById('modalDate').textContent = formatDate(picked.created_at);
    document.getElementById('modalContent').textContent = picked.content;
    document.getElementById('modalAuthor').textContent = `by ${picked.author || '익명'}`;
    document.getElementById('randomModal').classList.remove('hidden');
  });
  document.getElementById('modalConfirmBtn').addEventListener('click', () => {
    document.getElementById('randomModal').classList.add('hidden');
  });

  // 다른 유저 보기
  document.getElementById('viewOthersBtn').addEventListener('click', async () => {
    const { data } = await db.from('happy_savings').select('*').order('created_at', { ascending: false }).limit(30);
    document.getElementById('othersList').innerHTML = (data || []).map(e => `
      <div class="border border-gray-100 rounded-2xl p-4">
        <p class="text-sm font-bold mb-1">${formatDate(e.created_at)}</p>
        <p class="text-sm text-gray-600 leading-relaxed mb-2">${e.content}</p>
        <p class="text-xs text-gray-400">by ${e.author || '익명'}</p>
      </div>
    `).join('') || '<p class="text-sm text-gray-400 text-center py-4">아직 저금된 행복이 없어요.</p>';
    document.getElementById('othersModal').classList.remove('hidden');
  });
  document.getElementById('closeOthersBtn').addEventListener('click', () => {
    document.getElementById('othersModal').classList.add('hidden');
  });

  refreshCount();
</script>
</body>
</html>
