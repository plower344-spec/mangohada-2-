<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada — 나의 장례식</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white text-gray-900" data-page="funeral">

<div id="site-header"></div>

<main class="max-w-7xl mx-auto px-6">
<section class="py-10">
  <p class="text-2xl font-extrabold mb-6">나의 장례식</p>

  <div class="bg-gray-50 rounded-2xl p-6 flex justify-between items-center mb-8">
    <div><p class="text-xs text-gray-500 mb-1">초대인원</p><p class="text-2xl font-extrabold">8명</p></div>
    <button class="text-sm text-gray-400">관리하기 ›</button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div>
      <p class="text-sm font-bold mb-3">꼭 초대하고 싶은 사람 <span class="text-gray-400">8</span></p>
      <div class="space-y-3">
        <div class="border border-gray-100 rounded-xl p-4">
          <div class="flex justify-between text-sm font-bold mb-1"><span>엄마</span><span class="text-gray-400 font-normal text-xs">010-1234-5678</span></div>
          <p class="text-xs text-gray-500">내 방 서랍 안에 비상금 있는데 그거랑 통장 잔고랑 합쳐서 사회에 기부해줘.</p>
        </div>
        <div class="border border-gray-100 rounded-xl p-4 flex justify-between text-sm font-bold"><span>아빠</span><span class="text-gray-400 font-normal text-xs">010-1234-5678</span></div>
        <div class="border border-gray-100 rounded-xl p-4 flex justify-between text-sm font-bold"><span>누나</span><span class="text-gray-400 font-normal text-xs">010-1234-5678</span></div>
      </div>
    </div>
    <div>
      <p class="text-sm font-bold mb-3">초대 고민 중인 사람 <span class="text-gray-400">2</span></p>
      <div class="space-y-3">
        <div class="border border-gray-100 rounded-xl p-4 flex justify-between text-sm font-bold"><span>길동</span><span class="text-gray-400 font-normal text-xs">010-1234-5678</span></div>
        <div class="border border-gray-100 rounded-xl p-4 flex justify-between text-sm font-bold"><span>민수</span><span class="text-gray-400 font-normal text-xs">010-1234-5678</span></div>
      </div>
    </div>
    <div>
      <p class="text-sm font-bold mb-3">초대하고 싶지 않은 사람 <span class="text-gray-400">2</span></p>
      <div class="space-y-3 opacity-50">
        <div class="border border-gray-100 rounded-xl p-4 flex justify-between text-sm font-bold"><span>연주</span><span class="text-gray-400 font-normal text-xs">010-1234-5678</span></div>
        <div class="border border-gray-100 rounded-xl p-4 flex justify-between text-sm font-bold"><span>승배</span><span class="text-gray-400 font-normal text-xs">010-1234-████</span></div>
      </div>
    </div>
  </div>
</section>
</main>

<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/layout.js"></script>
</body>
</html>
