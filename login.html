<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mangohada — 로그인</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css">

<!-- 구글 로그인 SDK -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- 카카오 로그인 SDK -->
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
</head>
<body class="bg-[#FAFAFA] text-gray-900" data-page="login">

<main class="min-h-screen flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <a href="index.html" class="text-2xl font-extrabold tracking-tight">mango<span class="text-[#FFC107]">hada</span></a>
      <p class="text-sm text-gray-400 mt-2">나의 마지막까지, 좋은 삶으로 나아가기 위한 일상 기록</p>
    </div>

    <div class="bg-white border border-gray-100 rounded-3xl p-7">

      <!-- 탭 -->
      <div class="flex bg-gray-100 rounded-full p-1 mb-6 text-sm font-bold">
        <button id="tabLogin" class="flex-1 py-2 rounded-full bg-white shadow-sm">로그인</button>
        <button id="tabSignup" class="flex-1 py-2 rounded-full text-gray-400">회원가입</button>
      </div>

      <!-- ===== 로그인 폼 ===== -->
      <form id="loginForm" class="space-y-3">
        <input type="email" id="loginEmail" required placeholder="이메일" autocomplete="email"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#FFC107]">
        <div class="relative">
          <input type="password" id="loginPassword" required placeholder="비밀번호" autocomplete="current-password"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 pr-11 text-sm focus:outline-none focus:border-[#FFC107]">
          <button type="button" class="pw-toggle absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" data-target="loginPassword" aria-label="비밀번호 보기">
            <svg class="eye-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <svg class="eye-off-icon w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.162-3.591M6.228 6.228A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.967 9.967 0 01-4.293 5.23M3 3l18 18"/></svg>
          </button>
        </div>
        <button type="submit" class="w-full bg-black text-white text-sm font-bold py-3 rounded-xl">로그인</button>
      </form>

      <!-- ===== 회원가입 폼 ===== -->
      <form id="signupForm" class="space-y-3 hidden">
        <input type="text" id="signupName" required placeholder="닉네임"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#FFC107]">
        <input type="email" id="signupEmail" required placeholder="이메일" autocomplete="email"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#FFC107]">
        <div class="relative">
          <input type="password" id="signupPassword" required placeholder="비밀번호 (8자 이상)" minlength="8" autocomplete="new-password"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 pr-11 text-sm focus:outline-none focus:border-[#FFC107]">
          <button type="button" class="pw-toggle absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" data-target="signupPassword" aria-label="비밀번호 보기">
            <svg class="eye-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <svg class="eye-off-icon w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.162-3.591M6.228 6.228A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.967 9.967 0 01-4.293 5.23M3 3l18 18"/></svg>
          </button>
        </div>
        <div class="relative">
          <input type="password" id="signupPasswordConfirm" required placeholder="비밀번호 확인" autocomplete="new-password"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 pr-11 text-sm focus:outline-none focus:border-[#FFC107]">
          <button type="button" class="pw-toggle absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" data-target="signupPasswordConfirm" aria-label="비밀번호 보기">
            <svg class="eye-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <svg class="eye-off-icon w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.162-3.591M6.228 6.228A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.967 9.967 0 01-4.293 5.23M3 3l18 18"/></svg>
          </button>
        </div>
        <button type="submit" class="w-full bg-black text-white text-sm font-bold py-3 rounded-xl">가입하기</button>
      </form>

      <!-- 구분선 -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-gray-100"></div>
        <span class="text-xs text-gray-400">또는</span>
        <div class="flex-1 h-px bg-gray-100"></div>
      </div>

      <!-- 소셜 로그인 -->
      <div class="space-y-3">
        <!-- 구글 로그인 버튼은 Google SDK가 이 div 안에 자체 렌더링함 -->
        <div id="googleLoginBtn" class="w-full flex justify-center"></div>

        <button id="kakaoLoginBtn" type="button"
          class="w-full flex items-center justify-center gap-2 bg-[#FEE500] text-[#191919] text-sm font-bold py-3 rounded-xl">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.58 2 11c0 2.78 1.8 5.22 4.52 6.64-.2.72-.72 2.6-.83 3-.13.5.18.5.39.36.16-.1 2.6-1.77 3.67-2.5.73.1 1.48.16 2.25.16 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg>
          카카오로 계속하기
        </button>
      </div>

      <p class="text-[11px] text-gray-400 text-center mt-6 leading-relaxed">
        가입을 진행하면 망고하다의<br>
        <a href="#" class="underline">이용약관</a> 및 <a href="#" class="underline">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.
      </p>
    </div>
  </div>
</main>

<script src="assets/js/layout.js"></script>
<script src="assets/js/auth.js"></script>
<script>
  // 탭 전환
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  function showLogin() {
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
    tabLogin.classList.add('bg-white', 'shadow-sm');
    tabLogin.classList.remove('text-gray-400');
    tabSignup.classList.remove('bg-white', 'shadow-sm');
    tabSignup.classList.add('text-gray-400');
  }
  function showSignup() {
    signupForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
    tabSignup.classList.add('bg-white', 'shadow-sm');
    tabSignup.classList.remove('text-gray-400');
    tabLogin.classList.remove('bg-white', 'shadow-sm');
    tabLogin.classList.add('text-gray-400');
  }
  tabLogin.addEventListener('click', showLogin);
  tabSignup.addEventListener('click', showSignup);

  // 로그인 제출
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    loginWithEmail(email, password);
  });

  // 회원가입 제출
  signupForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
    if (password !== passwordConfirm) {
      alert('비밀번호가 일치하지 않습니다.');
      return;
    }
    signupWithEmail(name, email, password);
  });

  // 카카오 버튼
  document.getElementById('kakaoLoginBtn').addEventListener('click', loginWithKakao);

  // 이미 로그인된 상태면 홈으로
  if (getCurrentUser()) {
    window.location.href = 'index.html';
  }

  // 비밀번호 미리보기 토글
  document.querySelectorAll('.pw-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.querySelector('.eye-icon').classList.toggle('hidden', isHidden);
      btn.querySelector('.eye-off-icon').classList.toggle('hidden', !isHidden);
    });
  });
</script>
</body>
</html>
